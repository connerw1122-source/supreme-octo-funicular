# ===========================================================================
# MarqueeIT - docker-compose.yml
# ===========================================================================
# Runs the full stack:
#   - nextjs     : the Next.js app + API (port 3000 internally)
#   - signaling  : the Bun-based WebSocket signaling server (port 3003)
#   - caddy      : reverse proxy on port 80 (and 443 if you set DOMAIN)
#
# Usage:
#   docker compose up -d --build
#
# Then visit http://YOUR-SERVER-IP/  (or https://your-domain.com/ if you set
# DOMAIN below and have port 443 open).
#
# To persist data: the sqlite database is stored in the `db-data` volume.
# To back up: docker run --rm -v marqueeit_db-data:/data -v $(pwd):/backup \
#             alpine tar czf /backup/marqueeit-db-$(date +%F).tar.gz /data
# ===========================================================================

services:
  # -------------------------------------------------------------------------
  # Next.js app — frontend + REST API + serves the Go binaries for download
  # -------------------------------------------------------------------------
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marqueeit-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/db/marqueeit.db
      # Auth credentials for the technician login (override in .env)
      - TECH_USERNAME=${TECH_USERNAME:-Yoda}
      - TECH_PASSWORD=${TECH_PASSWORD:-changeme}
      # Public URL where customers reach this server. CRITICAL: this must be
      # set to your real public URL (e.g. https://support.example.com) because
      # the launcher scripts embed it so the customer's Go binary knows where
      # to connect. Override in .env.
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost}
    volumes:
      - db-data:/app/db
    # Don't expose port 3000 to the host — Caddy proxies to it internally
    expose:
      - "3000"
    networks:
      - marqueeit
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Signaling server — WebSocket relay for screen frames + input events
  # -------------------------------------------------------------------------
  signaling:
    build:
      context: ./mini-services/signaling-server
      dockerfile: Dockerfile
    container_name: marqueeit-signaling
    restart: unless-stopped
    environment:
      - PORT=3003
      - HOSTNAME=0.0.0.0
    expose:
      - "3003"
    networks:
      - marqueeit
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Caddy reverse proxy — single entry point on port 80 (and 443 if DOMAIN)
  # Routes:
  #   /api/*          -> nextjs:3000
  #   /downloads/*    -> nextjs:3000
  #   / (WebSocket)   -> signaling:3003  (if Upgrade: websocket header)
  #   / (HTTP)        -> nextjs:3000
  # -------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: marqueeit-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      # Set this to your real domain for automatic HTTPS via Let's Encrypt
      - DOMAIN=${DOMAIN:-:80}
    depends_on:
      - nextjs
      - signaling
    networks:
      - marqueeit

# Persistent volumes
volumes:
  db-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

# Internal network
networks:
  marqueeit:
    driver: bridge
