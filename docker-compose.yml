# ===========================================================================
# MarqueeIT - docker-compose.yml
# ===========================================================================
# Runs the Next.js app and signaling server. Designed to sit behind an
# EXISTING reverse proxy (Caddy, Nginx, Traefik, etc.) — does NOT include
# its own Caddy service to avoid port 80/443 conflicts.
#
# Connect both containers to your existing proxy's external network so the
# proxy can route to them by container name:
#   nextjs:3000    — the web app + REST API + Go binary downloads
#   signaling:3003 — WebSocket relay for screen frames + input events
#
# In your existing proxy config, add:
#   - HTTP routes for /api/*, /downloads/*, /_next/* → nextjs:3000
#   - WebSocket route (Connection: Upgrade + Upgrade: websocket) → signaling:3003
#   - All other HTTP routes → nextjs:3000
#
# Usage:
#   1. Copy .env.example to .env and set your domain + credentials
#   2. docker compose up -d --build
#   3. Configure your reverse proxy to route to these containers
# ===========================================================================

services:
  # -------------------------------------------------------------------------
  # Next.js app — frontend + REST API + serves the Go binaries for download
  # -------------------------------------------------------------------------
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marqueeit-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/db/marqueeit.db
      # Auth credentials (override in .env)
      - TECH_USERNAME=${TECH_USERNAME:-Yoda}
      - TECH_PASSWORD=${TECH_PASSWORD:-changeme}
      # CRITICAL: The public URL customers use to reach this server.
      # The launcher scripts embed this so the customer's Go binary knows
      # where to connect. Must match your reverse proxy's public URL.
      - PUBLIC_URL=${PUBLIC_URL:-https://support.wizardyoda.com}
    volumes:
      - db-data:/app/db
    # Expose ports to the Docker network (not to the host).
    # Your existing reverse proxy connects to these by container name.
    expose:
      - "3000"
    networks:
      - default
      # Connect to your existing proxy's network so it can reach these
      # containers by name. Uncomment and rename to match your setup:
      # - copyparty_default
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Signaling server — WebSocket relay for screen frames + input events
  # -------------------------------------------------------------------------
  signaling:
    build:
      context: ./mini-services/signaling-server
      dockerfile: Dockerfile
    container_name: marqueeit-signaling
    restart: unless-stopped
    environment:
      - PORT=3003
      - HOSTNAME=0.0.0.0
    expose:
      - "3003"
    networks:
      - default
      # - copyparty_default
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Persistent volumes
volumes:
  db-data:
    driver: local

# Internal network (containers talk to each other)
# To connect to an existing proxy's network, add it as an external network
# above and reference it in the services' networks lists.
networks:
  default:
    driver: bridge
  # Example: connect to an existing external network
  # copyparty_default:
  #   external: true
